server.port=8081
spring.application.name=NotificationService

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=notification-group

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.value.default.type=dev.tanay.notificationservice.dtos.EmailMessageDto

spring.kafka.consumer.auto-offset-reset=earliest

email.username=${SMTP_EMAIL_USERNAME}
email.password=${SMTP_EMAIL_PASSWORD}